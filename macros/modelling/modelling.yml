version: 2

macros:
  - name: date_key
    description: This macro converts the specified DateKey into a Date with the format 'YYYYMMDD'.
    docs:
      show: true
    arguments:
      - name: DateKey
        type: string
        description: The date is passed as an argument to get the YYYYMMDD format.

  - name: datetime_from_dim
    description: This macro creates the specified dateKey and timeKey fields into a DateTime with the specified format.
    docs:
      show: true
    arguments:
      - name: dateKey
        type: string
        description:  The date is passed as an argument, the format is YYYYMMDD.
      - name: timeKey
        type: string
        description: Time is passed as an argument, the format is HHMI.
      - name: dt_format
        type: string
        description: Converts the date-time into specified DateTime format otherwise 'YYYYMMDDHHMI' as a date format.

  - name: datetime_to_date_dim
    description: This macro converts the specified col fields into a Date with the format 'YYYYMMDD'.
    docs:
      show: true
    arguments:
      - name: col
        type: string
        description: The Name of the column

  - name: datetime_to_time_dim
    description: This macro converts the specified col field into a Time with the format 'HHMI'.
    docs:
      show: true
    arguments:
      - name: col
        type: string
        description: The Name of the column

  - name: time_key
    description: This macro converts the specified col field into a Time with the format 'HHMI'.  
    docs:
      show: true
    arguments:
      - name: TimeKey
        type: string
        description: The Name of the TimeKey Column.

  - name: dimension_id
    description: Concatenate the specified columns into a single surrogate identifier suitable for a dimension primary key.
    docs:
      show: true
    arguments:
      - name: field_list
        type: Array
        description: The list of fields to be concatenated.

  - name: generate_surrogate_key
    description: |
      Generate an MD5-based surrogate key from a list of fields. Each field is cast to string,
      NULLs are replaced with a sentinel value, and the concatenated result is hashed with MD5.
      Set var('surrogate_key_treat_nulls_as_empty_strings', true) to use empty strings instead of the sentinel.
    docs:
      show: true
    arguments:
      - name: field_list
        type: Array
        description: List of column expressions to include in the surrogate key hash.

  - name: unknown_member
    description: |
      Generate an "unknown member" SELECT row for a dimension table based on column metadata
      defined in the dbt graph. Produces default values by data type (_key/_pk columns use
      the unknown_member_surrogate_key var, dates use 1900-01-01, numbers use -1, strings use 'Unknown').
      The result is intended to be placed before a UNION ALL with the main dimension query.
    docs:
      show: true
    arguments:
      - name: model_name
        type: string
        description: The name of the dimension model whose columns define the unknown member shape.
